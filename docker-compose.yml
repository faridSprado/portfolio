services:
  proxy:
    image: nginx:alpine
    container_name: proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_TEMPERATURE: ${GEMINI_TEMPERATURE:-0.55}
      GEMINI_MAX_OUTPUT_TOKENS: ${GEMINI_MAX_OUTPUT_TOKENS:-2500}
      ADMIN_SECRET: ${ADMIN_SECRET:-dev-admin-secret-change-me}
      PORTFOLIO_CONTENT_PATH: ${PORTFOLIO_CONTENT_PATH:-/app/data/portfolio_content.json}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-Portfolio Farid <onboarding@resend.dev>}
      CONTACT_EMAIL: ${CONTACT_EMAIL:-faridvzx@gmail.com}
      SECRET_KEY: ${SECRET_KEY:-dev-only-secret-key-change-in-production}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost,http://127.0.0.1}
      CLIENT_ID: ${CLIENT_ID:-portfolio-client}
      CLIENT_SECRET: ${CLIENT_SECRET:-dev-secret-change-in-production}
    volumes:
      - ./data:/app/data
    command: /app/entrypoint.sh
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 3G
        reservations:
          memory: 1G

  frontend:
    build:
      context: ./portfolio
      dockerfile: Dockerfile
    container_name: frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: /api
      VITE_CLIENT_ID: ${CLIENT_ID:-portfolio-client}
      VITE_CLIENT_SECRET: ${CLIENT_SECRET:-dev-secret-change-in-production}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          memory: 128M
